# Proxy del puente para el QA.
# Si tu backend (el puente REST de facturación) corre en el host atado a loopback
# (p.ej. IIS Express en 127.0.0.1:8080) y su servidor rechaza cualquier Host header
# que no sea "localhost", este proxy reescribe el Host a localhost:8080 y reenvía a
# host.docker.internal:8080 (el loopback del host, alcanzable desde Docker Desktop).
# Así el plugin llega al puente sin admin ni portproxy: solo apunta a
# http://bridge/api/v1/facturas. Ajusta el puerto si tu backend usa otro.
server {
    listen 80;
    server_name _;

    location / {
        proxy_pass http://host.docker.internal:8080;
        proxy_set_header Host localhost:8080;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
